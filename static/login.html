<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
    <script>window.__AICLIENT_FORCE_UI_DEBUG__ = __AICLIENT_UI_DEBUG_FLAG__;</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f8fafc">
    <title data-i18n="login.title">登录 - All2One API</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="/static/favicon.svg?v=orbit-core-svg-primary">
    <script>
        (() => {
            const THEME_KEY = 'theme';
            const THEME_LIGHT = 'light';
            const THEME_DARK = 'dark';

            const savedTheme = (() => {
                try {
                    const theme = localStorage.getItem(THEME_KEY);
                    return theme === THEME_LIGHT || theme === THEME_DARK ? theme : null;
                } catch {
                    return null;
                }
            })();

            const systemTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? THEME_DARK
                : THEME_LIGHT;
            const resolvedTheme = savedTheme || systemTheme;
            const root = document.documentElement;

            if (resolvedTheme === THEME_DARK) {
                root.setAttribute('data-theme', THEME_DARK);
            } else {
                root.removeAttribute('data-theme');
            }

            root.style.colorScheme = resolvedTheme;
            window.__AICLIENT_LOGIN_THEME__ = resolvedTheme;
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            color-scheme: light;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
            background:
                radial-gradient(circle at top, rgba(16, 185, 129, 0.16), transparent 28%),
                linear-gradient(160deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            transition: background 0.25s ease, color 0.25s ease;
        }

        [data-theme="dark"] {
            color-scheme: dark;
        }

        [data-theme="dark"] body {
            background:
                radial-gradient(circle at top, rgba(52, 211, 153, 0.18), transparent 26%),
                linear-gradient(160deg, #020617 0%, var(--bg-primary) 48%, #111827 100%);
        }

        .login-container {
            background: var(--bg-glass-strong);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        [data-theme="dark"] .login-container {
            box-shadow: 0 24px 64px rgba(2, 6, 23, 0.48);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            margin-bottom: 15px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
        }

        .logo h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-tertiary);
        }

        .form-group input.error {
            border-color: var(--danger-color);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
        }

        .error-message {
            color: var(--danger-color);
            font-size: 13px;
            margin-top: 8px;
            display: none;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message.show {
            display: block;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(5, 150, 105, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .footer p {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="app/base.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/favicon.svg?v=orbit-core-svg-primary" alt="Logo" onerror="this.style.display='none'">
            <h1>All2One API</h1>
            <p data-i18n="login.heading">请登录以继续</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password" data-i18n="login.password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    data-i18n="login.passwordPlaceholder"
                    placeholder="请输入密码"
                    autocomplete="current-password"
                    required
                >
                <div class="error-message" id="errorMessage" data-i18n="login.error.incorrect">密码错误，请重试</div>
            </div>

            <button type="submit" class="login-button" id="loginButton" data-i18n="login.button">
                登录
            </button>
        </form>

        <div class="footer">
            <p>&copy; 2026 All2One API。保留所有权利。</p>
        </div>
    </div>

    <script type="module">
        import { initI18n, t } from './app/i18n.js';

        // 初始化多语言
        initI18n();

        const THEME_KEY = 'theme';
        const THEME_LIGHT = 'light';
        const THEME_DARK = 'dark';
        const forceUiDebug = window.__AICLIENT_FORCE_UI_DEBUG__ === true;
        const UI_DEBUG_HEADER = 'X-UI-Debug';
        const loginDebug = (message, payload = null, level = 'log') => {
            if (!forceUiDebug) return;
            const consoleMethod = typeof console[level] === 'function' ? console[level] : console.log;
            if (payload !== null && payload !== undefined) {
                consoleMethod.call(console, `[UI Debug] ${message}`, payload);
                return;
            }
            consoleMethod.call(console, `[UI Debug] ${message}`);
        };
        const buildLoginDebugHeaders = () => forceUiDebug ? { [UI_DEBUG_HEADER]: '1' } : {};
        const themeMediaQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

        loginDebug('login page script initialized', {
            path: window.location.pathname,
            search: window.location.search
        });
        
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const loginButton = document.getElementById('loginButton');

        function getSavedTheme() {
            try {
                const savedTheme = localStorage.getItem(THEME_KEY);
                return savedTheme === THEME_LIGHT || savedTheme === THEME_DARK ? savedTheme : null;
            } catch {
                return null;
            }
        }

        function getSystemTheme() {
            return themeMediaQuery && themeMediaQuery.matches ? THEME_DARK : THEME_LIGHT;
        }

        function updateThemeColor(theme) {
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
                metaThemeColor.setAttribute('content', theme === THEME_DARK ? '#0f172a' : '#f8fafc');
            }
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            if (theme === THEME_DARK) {
                root.setAttribute('data-theme', THEME_DARK);
            } else {
                root.removeAttribute('data-theme');
            }

            root.style.colorScheme = theme;
            updateThemeColor(theme);
            loginDebug('login theme applied', { theme });
        }

        function syncThemePreference() {
            applyTheme(getSavedTheme() || getSystemTheme());
        }

        syncThemePreference();

        if (themeMediaQuery && typeof themeMediaQuery.addEventListener === 'function') {
            themeMediaQuery.addEventListener('change', () => {
                if (!getSavedTheme()) {
                    syncThemePreference();
                }
            });
        }

        window.addEventListener('storage', (event) => {
            if (event.key === THEME_KEY) {
                syncThemePreference();
            }
        });

        // 检查是否已经登录
        loginDebug('checkLoginStatus start');
        checkLoginStatus();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                showError(t('login.error.empty'));
                return;
            }

            // 禁用按钮并显示加载状态
            loginButton.disabled = true;
            loginButton.innerHTML = `<span class="loading"></span>${t('login.loggingIn')}`;
            errorMessage.classList.remove('show');

            try {
                loginDebug('POST /api/login started');
                // 直接使用fetch进行登录请求（登录页面不需要token）
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...buildLoginDebugHeaders()
                    },
                    body: JSON.stringify({
                        password
                    })
                });

                const data = await response.json();
                loginDebug('POST /api/login completed', {
                    status: response.status,
                    ok: response.ok,
                    success: data?.success === true
                });

                if (response.ok && data.success) {
                    loginDebug('login succeeded, redirecting to /');
                    // 登录成功，保存token
                    localStorage.setItem('authToken', data.token);
                    
                    // 跳转到主页
                    window.location.href = '/';
                } else {
                    loginDebug('login failed', {
                        status: response.status,
                        message: data?.message || null
                    }, 'warn');
                    showError(data.message || t('login.error.incorrect'));
                    loginButton.disabled = false;
                    loginButton.innerHTML = t('login.button');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                loginDebug('POST /api/login failed', {
                    message: error?.message || String(error)
                }, 'error');
                console.error('登录错误:', error);
                showError(t('login.error.failed'));
                loginButton.disabled = false;
                loginButton.innerHTML = t('login.button');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            passwordInput.classList.add('error');
            
            setTimeout(() => {
                passwordInput.classList.remove('error');
            }, 300);
        }

        function checkLoginStatus() {
            const token = localStorage.getItem('authToken');
            
            if (token) {
                // Token存在，跳转到主页
                window.location.href = '/';
            }
        }

        // 监听输入，清除错误提示
        passwordInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });

        // 页面加载时聚焦到密码输入框
        passwordInput.focus();
    </script>
    </body>
</html>
